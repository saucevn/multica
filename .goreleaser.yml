version: 2

project_name: hira

builds:
  - id: hira
    main: ./cmd/hira
    dir: server
    binary: hira
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  # Versioned archive name used by current CLI / install scripts /
  # desktop bootstrap going forward.
  - id: versioned
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: hira
    ids:
      - versioned
    repository:
      owner: hira-vn
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/hira-vn/hira"
    description: "Hira CLI — local agent runtime and management tool for the Hira platform"
    license: "Apache-2.0"
    install: |
      bin.install "hira"
    test: |
      system "#{bin}/hira", "version"
