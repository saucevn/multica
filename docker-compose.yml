name: hira

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: hira
      POSTGRES_USER: ${POSTGRES_USER:-hira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hira}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
